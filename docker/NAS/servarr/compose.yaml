services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1030
      - PGID=100
      - TZ=Europe/Zurich
    volumes:
      - /volume1/docker/prowlarr:/config
    ports:
      - 9696:9696
    networks:
      - media-network
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    environment:
      - PUID=1030
      - PGID=100
      - TZ=Europe/Zurich
      - WEBUI_PORT=8080
    volumes:
      - /volume1/docker/qbittorrent:/config
      - /volume1/library:/data # On monte la racine pour les hardlinks
    depends_on:
      - gluetun
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1030
      - PGID=100
      - TZ=Europe/Zurich
    volumes:
      - /volume1/docker/sonarr:/config
      - /volume1/library:/data
    ports:
      - 8989:8989
    networks:
      - media-network
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1030
      - PGID=100
      - TZ=Europe/Zurich
    volumes:
      - /volume1/docker/radarr:/config
      - /volume1/library:/data
    ports:
      - 7878:7878
    networks:
      - media-network
    restart: unless-stopped
  
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1030
      - PGID=100
      - TZ=Europe/Zurich
    volumes:
      - /volume1/docker/bazarr:/config
      - /volume1/library:/data # Accès unique à toute la racine
    ports:
      - 6767:6767
    networks:
      - media-network
    restart: unless-stopped

  flaresolverr:
      image: ghcr.io/flaresolverr/flaresolverr:latest
      container_name: flaresolverr
      environment:
        - LOG_LEVEL=info
        - TZ=Europe/Zurich
      ports:
        - 8191:8191
      networks:
        - media-network
      restart: unless-stopped
  
  cross-seed:
    image: ghcr.io/cross-seed/cross-seed:6
    container_name: cross-seed
    user: "1030:100"
    network_mode: "service:gluetun"
    volumes:
      - /volume1/docker/cross-seed:/config
      - /volume1/library:/data
    depends_on:
      - gluetun
    command: daemon
    restart: unless-stopped

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - gluetun.env
    volumes:
      - /volume1/docker/gluetun:/gluetun
    ports:
      - 8080:8080       # qBittorrent
      - 2468:2468       # Cross-seed
      - 47696:47696     # AirVPN TCP
      - 47696:47696/udp # AirVPN UDP
    networks:
      - media-network
    restart: unless-stopped

networks:
  media-network:
    name: media-network
    driver: bridge

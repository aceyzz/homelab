services:
  homepage:
    image: nginx:alpine
    container_name: homepage
    hostname: homepage
    depends_on:
      - api
    restart: unless-stopped
    ports:
      - "5000:443"
    volumes:
      - ./frontend/config/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/ssl/:/etc/ssl/:ro
      - ./frontend/html:/var/www/html:ro

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    hostname: api
    labels:
      - diun.enable=false
    restart: unless-stopped
    environment:
      DASHBOARD_PATH: /data/dashboard.json
      ICONS_DIR: /icons
      SERVER_PORT: "8080"
      INSECURE_SKIP_VERIFY: "true"
      MAX_CONCURRENT_CHECKS: "20"
    volumes:
      - ./api/data:/data
      - ./frontend/html/assets/icons:/icons
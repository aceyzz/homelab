services:
  convertx:
    image: ghcr.io/c4illin/convertx
    container_name: convertx
    restart: unless-stopped
    ports:
      - "5006:3000"
    environment:
      - ACCOUNT_REGISTRATION=false
      - JWT_SECRET={{JWT_SECRET}}
      - HTTP_ALLOWED=true
      - ALLOW_UNAUTHENTICATED=true
      - AUTO_DELETE_EVERY_N_HOURS=24
    volumes:
      - ./data:/app/data